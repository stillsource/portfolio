version: 2

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gofmt
    - misspell

linters-settings:
  govet:
    check-shadowing: true
  gofmt:
    simplify: true

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
